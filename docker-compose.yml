# Memory Service production-style stack.
#
# Three services on one private network. The service is the only thing
# exposed to the host; postgres + falkordb stay internal (FalkorDB's
# Browser UI on 3000 is bound to 127.0.0.1 for human inspection but
# not exposed publicly).
#
#   cp .env.example .env
#   <fill in secrets>
#   docker compose up -d
#   curl http://localhost:18088/v1/health
#
# Volumes are named so `docker compose down` keeps data; use
# `docker compose down -v` to wipe.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-memory}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-memory_service}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-memory} -d ${POSTGRES_DB:-memory_service}"]
      interval: 10s
      timeout: 3s
      retries: 5

  falkordb:
    image: falkordb/falkordb:latest
    restart: unless-stopped
    volumes:
      - falkordb_data:/var/lib/falkordb/data
    healthcheck:
      # Same probe `adapters/falkordb.py` uses, executed inside the container.
      test: ["CMD", "redis-cli", "GRAPH.QUERY", "_healthcheck", "RETURN 1"]
      interval: 10s
      timeout: 3s
      retries: 5
    ports:
      # Browser UI; loopback-only so it isn't exposed beyond this host.
      # 13000 instead of 3000 to dodge the common port-3000 clash
      # (next.js / grafana / random dev servers).
      - "127.0.0.1:13000:3000"

  ollama:
    # Bundled embedding backend. GPU passthrough lives in
    # docker-compose.gpu.yml — deploy.sh auto-includes it when
    # `nvidia-smi` is present on the host.
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    # Bind on the host so OTHER hosts (e.g. a Forge KB on a different
    # machine) can use this GPU-backed ollama as their embedding /
    # inference endpoint. Internal containers (memory-service) still
    # reach it via the compose service name "ollama" — the port export
    # is purely for external callers.
    #
    # ⚠️ Ollama itself has NO auth: anyone who can reach this port can
    # query / load models. Only do this on a trusted network (internal
    # corp / VPN). Set OLLAMA_PORT in .env to override.
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  ollama-pull:
    # One-shot sidecar: pulls EMBED_MODEL into the ollama volume once
    # the daemon is healthy, then exits. Re-running compose `up` is a
    # no-op — `ollama pull` is idempotent (skips if already cached).
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      EMBED_MODEL: ${EMBEDDING_MODEL:-bge-m3}
    entrypoint:
      - sh
      - -c
      - |
        echo "[ollama-pull] ensuring $$EMBED_MODEL is present..."
        ollama pull "$$EMBED_MODEL"
        echo "[ollama-pull] done. Available models:"
        ollama list
    restart: "no"

  memory-service:
    build:
      context: .
      args:
        # On corporate networks where pypi cert verification is MITM'd
        # (self-signed CA in the chain), set PIP_TRUSTED_HOSTS=1 in
        # .env. Empty everywhere else.
        PIP_TRUSTED_HOSTS: "${PIP_TRUSTED_HOSTS:-}"
    image: memory-service:0.1.0
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      falkordb:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # These four override .env because the compose network names
      # ("postgres", "falkordb") are different from what you'd type on the
      # host (localhost:5432, localhost:6380).
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-memory}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-memory_service}"
      FALKORDB_HOST: "falkordb"
      FALKORDB_PORT: "6379"
      FALKORDB_BROWSER_PORT: "0"
      # Where the in-app backup feature writes dumps (must match the
      # backups_data mount below). Read by core/backups.py.
      BACKUP_DIR: "/app/.data/backups"
      # Where the falkordb RDB is readable from inside this container —
      # the falkordb data volume mounted read-only below. After a BGSAVE
      # the service copies the RDB from here into a backup.
      FALKORDB_DATA_DIR: "/falkordb-data"
    volumes:
      # Persist backups outside the container; survives recreate.
      - backups_data:/app/.data/backups
      # Read-only view of FalkorDB's data dir so the service can grab the
      # RDB after triggering BGSAVE — no docker exec / host access needed.
      - falkordb_data:/falkordb-data:ro
    ports:
      # Default: only the local host can reach the API. Set MS_BIND=0.0.0.0
      # in .env if you really want it open (and put nginx in front).
      - "${MS_BIND:-127.0.0.1}:${MS_PORT:-18088}:18088"

volumes:
  postgres_data:
  falkordb_data:
  ollama_data:
  backups_data:
