services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: memory
      POSTGRES_PASSWORD: memory
      POSTGRES_DB: memory_service
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memory -d memory_service"]
      interval: 5s
      timeout: 5s
      retries: 10

  falkordb:
    image: falkordb/falkordb:latest
    restart: unless-stopped
    # Mapped to 6380 on the host to leave 6379 free for any plain-redis
    # the user already runs (e.g. fortinac-redis). Inside the container
    # FalkorDB still listens on 6379.
    ports:
      - "6380:6379"
    volumes:
      - falkor-data:/var/lib/falkordb/data
    healthcheck:
      # Real GRAPH liveness — plain redis would fail this.
      test: ["CMD", "redis-cli", "GRAPH.QUERY", "_healthcheck", "RETURN 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      falkordb:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://memory:memory@db:5432/memory_service
      FALKORDB_HOST: falkordb
      # Container-to-container talks on the internal 6379, not the host 6380.
      FALKORDB_PORT: "6379"
      FALKORDB_GRAPH_NAME: memory
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      SECRET_KEY: ${SECRET_KEY:-change-me}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      APP_ENV: ${APP_ENV:-development}
    ports:
      - "8000:8000"

volumes:
  db-data:
  falkor-data:
