# Dev override: expose Postgres + FalkorDB on localhost so the
# host-side uvicorn (`./start.sh`) can reach them.
#
# Host port is picked dynamically by scripts/start_postgres.sh /
# scripts/start_falkordb.sh — they auto-bump to the next free port
# when the default is taken (system Postgres or another project's
# docker), and write the chosen value to `.data/postgres-port` /
# `.data/falkordb-port` so the rest of the toolchain (start.sh /
# install.sh) builds the right DATABASE_URL.
#
# Prod (docker-compose.yml alone) keeps both services internal-only.
# This file is opt-in for local dev work.

services:
  postgres:
    ports:
      - "127.0.0.1:${HOST_POSTGRES_PORT:-5432}:5432"
    # Dev creds — match what start_postgres.sh exports + the
    # DATABASE_URL the host-side toolchain constructs.
    environment:
      POSTGRES_USER: memory
      POSTGRES_PASSWORD: memory
      POSTGRES_DB: memory_service

  falkordb:
    ports:
      - "127.0.0.1:${HOST_FALKORDB_PORT:-6380}:6379"
