name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            npm_pkg: temper-darwin-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            npm_pkg: temper-darwin-x64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            npm_pkg: temper-linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare npm package
        run: |
          mkdir -p npm/${{ matrix.npm_pkg }}/bin
          cp target/${{ matrix.target }}/release/temper npm/${{ matrix.npm_pkg }}/bin/temper
          chmod +x npm/${{ matrix.npm_pkg }}/bin/temper

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.npm_pkg }}
          path: npm/${{ matrix.npm_pkg }}/

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: npm-artifacts/

      - name: Prepare packages
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "Publishing version: $VERSION"

          # Copy built binaries into npm package dirs
          for pkg in temper-darwin-arm64 temper-darwin-x64 temper-linux-x64; do
            cp -r npm-artifacts/$pkg/* npm/$pkg/
            ls -la npm/$pkg/bin/
          done

          # Update all package.json versions
          for dir in npm/temper npm/temper-darwin-arm64 npm/temper-darwin-x64 npm/temper-linux-x64; do
            cd $dir
            npm version $VERSION --no-git-tag-version --allow-same-version
            cd $GITHUB_WORKSPACE
          done

          # Update optionalDependencies versions in main package
          cd npm/temper
          node -e "
            const pkg = require('./package.json');
            const v = '$VERSION';
            for (const dep of Object.keys(pkg.optionalDependencies || {})) {
              pkg.optionalDependencies[dep] = v;
            }
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          cat package.json

      - name: Publish @aion0/temper-darwin-arm64
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: cd npm/temper-darwin-arm64 && npm publish --access public
        continue-on-error: true

      - name: Publish @aion0/temper-darwin-x64
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: cd npm/temper-darwin-x64 && npm publish --access public
        continue-on-error: true

      - name: Publish @aion0/temper-linux-x64
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: cd npm/temper-linux-x64 && npm publish --access public
        continue-on-error: true

      - name: Publish @aion0/temper (main package)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: cd npm/temper && npm publish --access public

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --generate-notes \
            npm/temper-darwin-arm64/bin/temper#temper-darwin-arm64 \
            npm/temper-darwin-x64/bin/temper#temper-darwin-x64 \
            npm/temper-linux-x64/bin/temper#temper-linux-x64 \
            || echo "Release creation failed"
