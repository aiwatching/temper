{% extends "base.html" %}
{% block content %}
<section class="card">
  <h2>Write a memory</h2>
  <form id="write-form" class="stacked">
    <label>Namespace
      <input type="text" name="namespace" placeholder="leave blank, or use 'user:me' / 'public' / 'group:&lt;slug&gt;'">
    </label>
    <label>Content
      <textarea name="content" rows="4" placeholder="e.g. Jerry's new English teacher is Sarah. They meet on Tuesdays at 9am." required style="font:inherit;padding:8px 10px;border:1px solid #e5e7eb;border-radius:4px;"></textarea>
    </label>
    <label>Source type
      <select name="source_type">
        <option value="text">text</option>
        <option value="message">message</option>
        <option value="json">json</option>
      </select>
    </label>
    <label>Tags (comma-separated, optional)
      <input type="text" name="tags" placeholder="english-learning, schedule">
    </label>
    <label>Saga (optional — chain related episodes)
      <input type="text" name="saga" placeholder="e.g. tuesday-standup">
    </label>
    <label style="flex-direction:row; align-items:center; gap:8px">
      <input type="checkbox" name="async_extract">
      Async (return immediately, extract in background)
    </label>
    <button type="submit">Add episode</button>
  </form>
  <div id="write-msg"></div>
</section>

<section class="card">
  <h2>Search memory</h2>
  <form id="search-form" class="stacked">
    <label>Query
      <input type="text" name="query" placeholder="Who is Jerry's English teacher?" required>
    </label>
    <label>Namespaces (comma-separated, optional)
      <input type="text" name="namespaces" placeholder="blank = all readable.  e.g. 'user:me, public'">
    </label>
    <label>Limit
      <input type="number" name="limit" min="1" max="50" value="10">
    </label>
    <button type="submit">Search</button>
  </form>
  <div id="search-result"></div>
</section>

<section class="card">
  <h2>Your episodes</h2>
  <button id="refresh-list">Refresh</button>
  <table id="episodes-table">
    <thead><tr>
      <th>When</th><th>Namespace</th><th>Agent</th><th>Status</th><th>Tags</th><th>ID</th><th></th>
    </tr></thead>
    <tbody><tr><td colspan="7"><em>Loading…</em></td></tr></tbody>
  </table>
</section>

<dialog id="detail-modal" style="max-width:720px;padding:0;border:1px solid #e5e7eb;border-radius:6px;">
  <div style="padding:16px 20px;">
    <button id="modal-close" style="float:right;background:transparent;color:#57606a;border:0;font-size:18px;cursor:pointer;">×</button>
    <h3 id="modal-title">Episode</h3>
    <div id="modal-body"></div>
  </div>
</dialog>

<script>
  const token = localStorage.getItem("ms_token");
  if (!token) { location.href = "/admin/login"; }
  const auth = { "Authorization": `Bearer ${token}`, "Content-Type": "application/json" };

  function fmt(d) { return d ? new Date(d).toISOString().replace("T"," ").slice(0,19) : ""; }

  document.getElementById("write-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const body = {
      namespace: fd.get("namespace") || null,
      content: fd.get("content"),
      source_type: fd.get("source_type"),
      tags: (fd.get("tags") || "").split(",").map(s => s.trim()).filter(Boolean),
    };
    const saga = (fd.get("saga") || "").trim();
    if (saga) body.saga = saga;
    const isAsync = fd.get("async_extract") === "on";
    const path = isAsync ? "/v1/episodes?async_extract=true" : "/v1/episodes";
    const out = document.getElementById("write-msg");
    out.innerHTML = `<div class='msg ok'><em>${isAsync ? 'Queueing for extraction…' : 'Extracting entities + writing to graph…'}</em></div>`;
    const r = await fetch(path, { method:"POST", headers: auth, body: JSON.stringify(body) });
    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      out.innerHTML = `<div class='msg bad'>Failed: ${err.detail || r.status}</div>`;
      return;
    }
    const data = await r.json();
    if (isAsync) {
      out.innerHTML = `<div class='msg ok'>
        Queued episode <code>${data.episode_id}</code> in <code>${data.namespace}</code> — extraction running in background.
      </div>`;
    } else {
      out.innerHTML = `<div class='msg ok'>
        Saved episode <code>${data.episode_id}</code> in <code>${data.namespace}</code>.
        Extracted <strong>${data.extracted_entities.length}</strong> entities,
        <strong>${data.extracted_facts.length}</strong> facts.
      </div>`;
    }
    e.target.reset();
    loadList();
  });

  document.getElementById("search-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const params = new URLSearchParams({
      query: fd.get("query"),
      limit: fd.get("limit") || "10",
    });
    if (fd.get("namespaces")) params.set("namespaces", fd.get("namespaces"));
    const out = document.getElementById("search-result");
    out.innerHTML = `<div class='msg ok'><em>Searching…</em></div>`;
    const r = await fetch(`/v1/search?${params}`, { headers: auth });
    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      out.innerHTML = `<div class='msg bad'>Failed: ${err.detail || r.status}</div>`;
      return;
    }
    const data = await r.json();
    if (data.facts.length === 0) {
      out.innerHTML = `<div class='msg ok'>No hits for "${data.query}".</div>`;
      return;
    }
    out.innerHTML = `<table><thead><tr><th>Fact</th><th>Namespace</th><th>Valid</th><th>Invalid</th><th>Source episodes</th></tr></thead><tbody>
      ${data.facts.map(f => `
        <tr>
          <td>${f.fact}</td>
          <td><code>${f.namespace}</code></td>
          <td>${fmt(f.valid_at) || "—"}</td>
          <td>${fmt(f.invalid_at) || "—"}</td>
          <td>${(f.source_episode_ids || []).map(id => `<code>${id.slice(0,8)}…</code>`).join(" ")}</td>
        </tr>`).join("")}
      </tbody></table>`;
  });

  // Poll any "pending" rows every 3s — async writes flip pending → done | failed.
  let pollTimer = null;
  async function loadList() {
    const tbody = document.querySelector("#episodes-table tbody");
    tbody.innerHTML = `<tr><td colspan='7'><em>Loading…</em></td></tr>`;
    const r = await fetch("/v1/episodes?limit=50", { headers: auth });
    if (!r.ok) { tbody.innerHTML = `<tr><td colspan='7' class='bad'>Failed (${r.status})</td></tr>`; return; }
    const data = await r.json();
    if (data.episodes.length === 0) {
      tbody.innerHTML = "<tr><td colspan='7'><em>No episodes yet.</em></td></tr>";
      return;
    }
    // Fetch per-episode status for any row whose state we care to surface.
    // /v1/episodes (list) doesn't include status; the /status endpoint does.
    const statuses = await Promise.all(data.episodes.map(e =>
      fetch(`/v1/episodes/${e.episode_id}/status`, { headers: auth })
        .then(r => r.ok ? r.json() : null)
        .catch(() => null)
    ));
    let anyPending = false;
    tbody.innerHTML = data.episodes.map((e, i) => {
      const st = statuses[i] || {};
      const badge = st.extraction_status
        ? `<span class='badge ${st.extraction_status}'>${st.extraction_status}</span>`
        : "";
      if (st.extraction_status === "pending") anyPending = true;
      return `
        <tr>
          <td>${fmt(e.created_at)}</td>
          <td><code>${e.namespace}</code></td>
          <td>${e.created_by_agent}</td>
          <td>${badge}</td>
          <td>${(e.tags || []).join(", ")}</td>
          <td><code>${e.episode_id.slice(0,12)}…</code></td>
          <td>
            <button class='view' data-id='${e.episode_id}'>View</button>
            <button class='del'  data-id='${e.episode_id}'>Delete</button>
          </td>
        </tr>`;
    }).join("");
    document.querySelectorAll("button.view").forEach(b => b.addEventListener("click", () => viewEpisode(b.dataset.id)));
    document.querySelectorAll("button.del").forEach(b => b.addEventListener("click", async () => {
      if (!confirm(`Delete episode ${b.dataset.id}? Removes the original record and any facts only derived from it.`)) return;
      const r = await fetch(`/v1/episodes/${b.dataset.id}`, { method: "DELETE", headers: auth });
      if (r.status === 204) loadList();
    }));

    // Re-poll if anything is still extracting in the background.
    if (pollTimer) clearTimeout(pollTimer);
    if (anyPending) pollTimer = setTimeout(loadList, 3000);
  }

  async function viewEpisode(id) {
    const r = await fetch(`/v1/episodes/${id}`, { headers: auth });
    if (!r.ok) { alert(`Failed: ${r.status}`); return; }
    const data = await r.json();
    document.getElementById("modal-title").textContent = "Episode " + data.episode_id.slice(0, 12) + "…";
    document.getElementById("modal-body").innerHTML = `
      <p><strong>Namespace:</strong> <code>${data.namespace}</code> ·
         <strong>Agent:</strong> ${data.created_by_agent} ·
         <strong>When:</strong> ${fmt(data.created_at)}</p>
      <h4>Content</h4>
      <pre style="white-space:pre-wrap;background:#f6f8fa;padding:8px;border-radius:4px;">${data.content || "(empty)"}</pre>
      <h4>Extracted entities (${data.entities.length})</h4>
      <ul>${data.entities.map(e => `<li><strong>${e.name}</strong>${e.summary ? ` — ${e.summary}` : ""}</li>`).join("") || "<li><em>none</em></li>"}</ul>
      <h4>Extracted facts (${data.facts.length})</h4>
      <ul>${data.facts.map(f => `<li>${f.fact}</li>`).join("") || "<li><em>none</em></li>"}</ul>
    `;
    document.getElementById("detail-modal").showModal();
  }
  document.getElementById("modal-close").addEventListener("click", () => document.getElementById("detail-modal").close());

  document.getElementById("refresh-list").addEventListener("click", loadList);
  loadList();
</script>
{% endblock %}
