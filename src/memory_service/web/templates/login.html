{% extends "base.html" %}
{% block content %}
<h2>Sign in</h2>

<form id="login-form" class="stacked">
  <label>Email <input type="email" name="email" required autofocus></label>
  <label>Password <input type="password" name="password" minlength="8" required></label>
  <button type="submit">Sign in</button>
</form>

<div id="msg"></div>

<div class="auth-foot">
  <a href="/admin/forgot">Forgot password?</a>
  <span>Invite-only — contact your admin</span>
</div>

<script>
  // Already signed in → skip the form.
  if (localStorage.getItem("ms_token")) {
    location.replace("/admin");
  }

  const msg = (text, cls="ok") => {
    document.getElementById("msg").innerHTML = `<div class="msg ${cls}">${text}</div>`;
  };

  document.getElementById("login-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const body = JSON.stringify(Object.fromEntries(fd));
    const r = await fetch("/v1/auth/login", { method: "POST", headers: {"Content-Type":"application/json"}, body });
    if (!r.ok) { msg("Invalid email or password", "bad"); return; }
    const data = await r.json();
    localStorage.setItem("ms_token", data.access_token);
    localStorage.setItem("ms_email", fd.get("email"));
    location.href = "/admin";
  });
</script>
{% endblock %}
