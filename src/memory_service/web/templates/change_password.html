{% extends "base.html" %}
{% block content %}
<section class="card" x-data="changePwdPage()" x-init="init()">
  <h2>Change your password</h2>
  <p style="color:var(--muted)">
    <template x-if="forced">
      <span>Your account was set up with a default / reset password.
      Pick a new one before you can use the service.</span>
    </template>
    <template x-if="!forced">
      <span>Regular self-service password change.</span>
    </template>
  </p>

  <form @submit.prevent="submit()" class="stacked">
    <label>Current password <input type="password" x-model="oldPwd" required></label>
    <label>New password (≥ 8 chars) <input type="password" x-model="newPwd" minlength="8" required></label>
    <label>Confirm new password <input type="password" x-model="confirm" required></label>
    <button type="submit" :disabled="busy">
      <span x-text="busy ? 'Updating…' : 'Change password'"></span>
    </button>
  </form>
  <template x-if="error"><div class="msg bad" x-text="error"></div></template>
  <template x-if="ok"><div class="msg ok" x-text="ok"></div></template>
</section>

<script>
  function changePwdPage() {
    return {
      oldPwd: "", newPwd: "", confirm: "",
      busy: false, error: null, ok: null,
      forced: false,
      async init() {
        window.ms.requireAuth();
        try {
          const me = window.ms.me || await window.ms.json("/v1/auth/me");
          window.ms.me = me;
          this.forced = me.must_change_password === true;
        } catch (e) {}
      },
      async submit() {
        if (this.newPwd !== this.confirm) {
          this.error = "Passwords don't match.";
          return;
        }
        this.busy = true; this.error = null; this.ok = null;
        try {
          const r = await window.ms.fetch("/v1/auth/change-password", {
            method: "POST",
            body: JSON.stringify({old_password: this.oldPwd, new_password: this.newPwd}),
          });
          if (r.status === 204) {
            this.ok = "Password updated. Redirecting…";
            window.ms.me = null;  // force re-fetch
            setTimeout(() => location.href = "/admin", 800);
          } else {
            const err = await r.json().catch(() => ({}));
            throw new Error(err.detail || `HTTP ${r.status}`);
          }
        } catch (e) {
          this.error = e.message || String(e);
        } finally {
          this.busy = false;
        }
      },
    };
  }
</script>
{% endblock %}
