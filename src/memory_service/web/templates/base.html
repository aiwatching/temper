<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "Memory Service" }}</title>
  <link rel="stylesheet" href="/admin/static/style.css">
</head>
<body>
  <header>
    <h1><a href="/admin">Memory Service</a></h1>
    <nav>
      <a href="/admin">Dashboard</a>
      <a href="/admin/me">Account</a>
      <a href="/admin/episodes">Episodes</a>
      <a href="/docs" target="_blank">API docs</a>
    </nav>
    <span class="auth-status" id="auth-status"></span>
  </header>
  <script>
    // Render "signed in as X" or a Login link in the header.
    (function () {
      const el = document.getElementById("auth-status");
      const token = localStorage.getItem("ms_token");
      const email = localStorage.getItem("ms_email");
      if (token && email) {
        el.innerHTML = `Signed in as <strong>${email}</strong> · <a href="#" id="logout">Logout</a>`;
        document.getElementById("logout").addEventListener("click", (e) => {
          e.preventDefault();
          localStorage.removeItem("ms_token");
          localStorage.removeItem("ms_email");
          location.href = "/admin";
        });
      } else {
        el.innerHTML = `<a href="/admin/login">Login</a> · <a href="/admin/login#register">Register</a>`;
      }
    })();
  </script>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer>
    <small>v0.1.0 · Phase 1.x scaffold</small>
  </footer>
</body>
</html>
