<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "Memory Service" }}</title>
  <link rel="stylesheet" href="/admin/static/style.css">
  <script defer src="https://unpkg.com/alpinejs@3.13.5/dist/cdn.min.js"></script>
</head>
<body class="app">
  <aside class="sidebar">
    <div class="brand">
      <a href="/admin">
        <span class="logo">●</span>
        <span class="brand-text">Memory<br><small>Service</small></span>
      </a>
    </div>

    <nav class="side-nav">
      <div class="nav-section">
        <h4>Memory</h4>
        <a href="/admin"            data-path="/admin">Dashboard</a>
        <a href="/admin/episodes"   data-path="/admin/episodes">Episodes</a>
        <a href="/admin/search"     data-path="/admin/search">Search</a>
        <a href="/admin/graph"      data-path="/admin/graph">Graph viewer</a>
      </div>

      <div class="nav-section">
        <h4>Knowledge</h4>
        <a href="/admin/sagas"       data-path="/admin/sagas">Sagas</a>
        <a href="/admin/schemas"     data-path="/admin/schemas">Entity schemas</a>
        <a href="/admin/communities" data-path="/admin/communities">Communities</a>
      </div>

      <div class="nav-section">
        <h4>Tenancy</h4>
        <a href="/admin/orgs"   data-path="/admin/orgs">Orgs</a>
        <a href="/admin/groups" data-path="/admin/groups">Groups</a>
      </div>

      <div class="nav-section">
        <h4>Ops</h4>
        <a href="/admin/cypher" data-path="/admin/cypher">Cypher console</a>
        <a href="/docs" target="_blank">API docs ↗</a>
      </div>
    </nav>

    <div class="sidebar-foot">
      <a href="/admin/me" class="me-link" id="me-link"><span>Account</span></a>
      <span id="auth-status" class="auth-status"></span>
    </div>
  </aside>

  <script>
    // Shared API helper used by every page's Alpine component.
    window.ms = {
      token() { return localStorage.getItem("ms_token"); },
      email() { return localStorage.getItem("ms_email"); },
      authHeaders() {
        const t = this.token();
        return t ? { "Authorization": `Bearer ${t}`, "Content-Type": "application/json" }
                 : { "Content-Type": "application/json" };
      },
      async fetch(path, opts = {}) {
        const r = await fetch(path, { ...opts, headers: { ...this.authHeaders(), ...(opts.headers || {}) } });
        if (r.status === 401) { location.href = "/admin/login"; throw new Error("unauthenticated"); }
        return r;
      },
      async json(path, opts = {}) {
        const r = await this.fetch(path, opts);
        if (!r.ok) {
          const err = await r.json().catch(() => ({}));
          throw new Error(err.detail || `HTTP ${r.status}`);
        }
        return r.status === 204 ? null : r.json();
      },
      fmtDate(d) { return d ? new Date(d).toISOString().replace("T", " ").slice(0, 19) : ""; },
      fmtId(id, n = 8) { return id ? id.slice(0, n) + "…" : ""; },
      requireAuth() {
        if (!this.token()) { location.href = "/admin/login"; }
      },
    };

    // Highlight the nav link matching the current path.
    (function () {
      const path = location.pathname;
      document.querySelectorAll(".side-nav a[data-path]").forEach(a => {
        if (a.dataset.path === path) a.classList.add("active");
      });
      const me = document.getElementById("me-link");
      if (me && path === "/admin/me") me.classList.add("active");
    })();

    // Auth status footer block.
    (function () {
      const el = document.getElementById("auth-status");
      const token = localStorage.getItem("ms_token");
      const email = localStorage.getItem("ms_email");
      if (token && email) {
        el.innerHTML = `
          <span class="who" title="${email}">${email}</span>
          <a href="#" id="logout">Sign out</a>`;
        document.getElementById("logout").addEventListener("click", (e) => {
          e.preventDefault();
          localStorage.removeItem("ms_token");
          localStorage.removeItem("ms_email");
          location.href = "/admin";
        });
      } else {
        el.innerHTML = `<a href="/admin/login">Sign in</a>`;
      }
    })();
  </script>

  <main class="content {% if wide %}wide{% endif %}">
    <header class="page-header">
      <h1>{{ title or "Memory Service" }}</h1>
    </header>
    {% block content %}{% endblock %}
    <footer>
      <small>v0.1.0 · Memory Service</small>
    </footer>
  </main>
</body>
</html>
