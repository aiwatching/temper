# Example nginx reverse proxy for Memory Service.
#
# Drop into /etc/nginx/sites-available/memory-service.conf (or your
# distro's equivalent), symlink into sites-enabled, `nginx -t` then
# reload. Assumes the service runs on 127.0.0.1:8000 (MS_BIND default
# in .env.prod).
#
# What this gives you:
#   - TLS termination on 443 (you bring your own cert; example assumes
#     /etc/letsencrypt/live/<host>/ shape).
#   - Real-client-IP headers passed through so service logs are honest.
#   - Big-enough request body limit for the bulk-write endpoint (200
#     episodes × up to 64KB each).
#   - Long timeouts so cross_encoder reranker calls don't time out.
#   - Browser UI for FalkorDB at /falkordb/ if you want it exposed
#     (otherwise comment that block out).

upstream memory_service {
    server 127.0.0.1:8000;
    keepalive 16;
}

server {
    listen 80;
    server_name memory.example.com;

    # Force HTTPS.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name memory.example.com;

    ssl_certificate     /etc/letsencrypt/live/memory.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/memory.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # The bulk-write endpoint can carry up to ~13MB of content
    # (200 items × 64KB). 16MB gives slack.
    client_max_body_size 16M;

    # Forward real IP + scheme so service logs and any rate-limiting
    # see the actual client, not the loopback proxy.
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # LLM calls can take a while. cross_encoder rerank + a big query
    # may push 30+s wallclock.
    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;
    proxy_read_timeout    120s;

    location / {
        proxy_pass http://memory_service;
    }
}
